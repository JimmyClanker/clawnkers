<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Scanner — Chalkboard Research</title>
  <meta name="description" content="Deep crypto alpha scans with collector data, scoring, and Grok synthesis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: rgba(255, 255, 255, 0.03);
      --line: rgba(232, 232, 232, 0.2);
      --text: #e8e8e8;
      --muted: #888888;
      --buy: #a8e6cf;
      --avoid: #ff8b94;
      --hold: #ffd3b6;
      --info: #b5c7d3;
      --dev: #c5b3e6;
      --warn: #ffaaa5;
      --shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 18px 50px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(197,179,230,0.08), transparent 35%), var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
    }
    a { color: var(--hold); }
    .wrap {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 64px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }
    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }
    .chalk-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 0.95;
      margin: 0 0 8px;
      letter-spacing: 1px;
    }
    .sub {
      color: var(--muted);
      max-width: 740px;
      margin-bottom: 22px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
    }
    input {
      width: 100%;
      min-width: 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,232,232,0.18);
      border-radius: 14px;
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }
    input:focus { border-color: var(--buy); box-shadow: 0 0 0 3px rgba(168,230,207,0.12); }
    button, .ghost {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 13px 18px;
      font: inherit;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    button { background: linear-gradient(135deg, rgba(168,230,207,0.16), rgba(181,199,211,0.1)); }
    .status {
      min-height: 88px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      color: var(--muted);
    }
    .loading-wrap {
      width: min(560px, 100%);
      display: grid;
      gap: 8px;
    }
    .chalk-loading {
      font-family: 'Caveat', cursive;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: 1px;
      color: var(--text);
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      text-shadow: 0 0 10px rgba(232,232,232,0.08);
    }
    .loading-project {
      color: var(--buy);
      max-width: 18ch;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .loading-dots::after {
      content: '';
      display: inline-block;
      width: 1.4em;
      text-align: left;
      animation: dots 1.2s steps(4, end) infinite;
    }
    .loading-bar {
      position: relative;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .loading-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, rgba(168,230,207,0.15), var(--hold), var(--buy), rgba(168,230,207,0.15));
      animation: progressSweep 1.7s ease-in-out infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
    @keyframes progressSweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .panel { padding: 20px; }
    .hidden { display: none !important; }
    .header-row, .footer-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .project-name {
      font-family: 'Caveat', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin: 0;
    }
    .verdict-wrap {
      display: grid;
      justify-items: end;
      gap: 8px;
    }
    .verdict {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      padding: 14px 24px;
      border-radius: 22px;
      border: 1px dashed currentColor;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 24px currentColor;
    }
    .overall-score {
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
      line-height: 1;
    }
    .buy { color: var(--buy); }
    .hold { color: var(--hold); }
    .avoid { color: var(--avoid); }
    .section-title {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      margin: 0 0 14px;
      color: var(--info);
    }
    .analysis {
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .score-list { display: grid; gap: 12px; }
    .score-row {
      display: grid;
      grid-template-columns: 130px 1fr 54px;
      gap: 10px;
      align-items: center;
    }
    .bar {
      height: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
    }
    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      transition: width 0.25s ease, background 0.25s ease;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .card {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 14px;
      min-height: 100%;
    }
    .card h3 {
      margin: 0 0 10px;
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
    }
    .card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
    }
    .card li + li { margin-top: 8px; }
    .moat { color: var(--buy); }
    .risks { color: var(--avoid); }
    .catalysts { color: var(--hold); }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    .table th, .table td {
      border-bottom: 1px dashed rgba(255,255,255,0.14);
      padding: 10px 0;
      text-align: left;
      vertical-align: top;
    }
    .table th { color: var(--muted); font-weight: 500; width: 38%; }
    .table td { word-break: break-word; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .sentiment-box {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 14px;
      min-height: 100%;
    }
    .footnote { color: var(--muted); font-size: 0.88rem; }
    .error {
      color: var(--avoid);
      border: 1px dashed rgba(255,139,148,0.35);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,139,148,0.05);
    }
    svg { width: 100%; height: auto; display: block; overflow: visible; }
    @media (max-width: 900px) {
      .grid, .two-col, .mini-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .score-row { grid-template-columns: 1fr; }
      .wrap { width: min(100% - 16px, 1120px); }
      .header-row { align-items: flex-start; }
      .verdict-wrap { justify-items: start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="chalk-title">Alpha Scanner</div>
      <div class="sub">Lavagna operativa per leggere market, onchain, social, dev e tokenomics in un colpo solo.</div>
      <form id="scan-form" class="toolbar">
        <input id="project-input" name="project" type="text" maxlength="100" placeholder="solana, sei, jup, hyperliquid..." autocomplete="off" />
        <button type="submit">Scan</button>
        <a href="#" id="quick-link" class="ghost">Quick scan (free)</a>
      </form>
      <div class="status" id="status"></div>
    </section>

    <section id="error-box" class="panel hidden"></section>
    <section id="report" class="hidden"></section>
  </main>

  <script>
    const form = document.getElementById('scan-form');
    const input = document.getElementById('project-input');
    const quickLink = document.getElementById('quick-link');
    const statusBox = document.getElementById('status');
    const reportBox = document.getElementById('report');
    const errorBox = document.getElementById('error-box');

    const SCORE_META = [
      ['market_strength', 'Market', '#b5c7d3'],
      ['onchain_health', 'Onchain', '#a8e6cf'],
      ['social_momentum', 'Social', '#ffd3b6'],
      ['development', 'Dev', '#c5b3e6'],
      ['tokenomics_health', 'Tokenomics', '#ffdfba'],
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function verdictClass(verdict) {
      const value = String(verdict || '').toUpperCase();
      if (value.includes('BUY')) return 'buy';
      if (value.includes('HOLD')) return 'hold';
      return 'avoid';
    }

    function formatCompactNumber(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 'n/a';
      const abs = Math.abs(num);
      const sign = num < 0 ? '-' : '';
      if (abs >= 1e12) return `${sign}$${(abs / 1e12).toFixed(2)}t`;
      if (abs >= 1e9) return `${sign}$${(abs / 1e9).toFixed(2)}B`;
      if (abs >= 1e6) return `${sign}$${(abs / 1e6).toFixed(2)}M`;
      if (abs >= 1e3) return `${sign}$${(abs / 1e3).toFixed(2)}K`;
      if (abs > 0 && abs < 1) {
        const decimals = abs < 0.0001 ? 6 : abs < 0.01 ? 5 : 4;
        return `${sign}$${abs.toFixed(decimals)}`;
      }
      return `${sign}$${abs.toFixed(abs < 100 ? 2 : 0)}`;
    }

    function formatPercent(value, decimals = 1, signed = false) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 'n/a';
      const prefix = signed && num > 0 ? '+' : '';
      return `${prefix}${num.toFixed(decimals)}%`;
    }

    function formatPrice(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 'n/a';
      const abs = Math.abs(num);
      if (abs >= 1000) return formatCompactNumber(num);
      if (abs >= 1) return `$${num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      if (abs > 0) {
        const decimals = abs < 0.0001 ? 6 : abs < 0.01 ? 5 : 4;
        return `$${num.toFixed(decimals)}`;
      }
      return '$0.00';
    }

    function formatNumber(value, key = '') {
      if (value === null || value === undefined || value === '') return 'n/a';
      if (typeof value === 'string' && value.trim() === '') return 'n/a';
      const normalizedKey = String(key || '').toLowerCase();
      const numericValue = typeof value === 'number' ? value : Number(String(value).replace(/,/g, ''));

      if (!Number.isFinite(numericValue)) return String(value);
      if (normalizedKey.includes('pct') || normalizedKey.includes('%')) return formatPercent(numericValue, 1);

      const abs = Math.abs(numericValue);
      if (abs >= 1e12) return `$${(numericValue / 1e12).toFixed(2)}t`;
      if (abs >= 1e9) return `$${(numericValue / 1e9).toFixed(2)}B`;
      if (abs >= 1e6) return `$${(numericValue / 1e6).toFixed(2)}M`;
      if (abs >= 1e3) return `$${(numericValue / 1e3).toFixed(2)}K`;
      if (abs > 0 && abs < 1) {
        const decimals = abs < 0.0001 ? 6 : abs < 0.01 ? 5 : 4;
        return numericValue.toFixed(decimals);
      }
      return numericValue.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function formatMetricValue(label, key, value) {
      const normalizedKey = String(key || label || '').toLowerCase();
      if (value === null || value === undefined || value === '') return 'n/a';

      switch (normalizedKey) {
        case 'price':
        case 'current_price':
        case 'price_usd':
          return formatPrice(value);
        case 'market_cap':
        case 'total_volume':
        case 'fdv':
        case 'tvl':
        case 'fees_7d':
        case 'revenue_7d':
          return formatCompactNumber(value);
        case 'tvl_change_7d':
        case 'tvl_change_30d':
          return formatPercent(value, 1, true);
        case 'pct_circulating':
          return formatPercent(value, 1);
        case 'inflation_rate':
          return formatPercent(value, 2);
        default:
          return formatNumber(value, normalizedKey);
      }
    }

    function formatDuration(ms) {
      const totalSeconds = Math.max(0, Math.round(Number(ms || 0) / 1000));
      if (totalSeconds < 60) return `${totalSeconds}s`;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      if (minutes < 60) return seconds ? `${minutes}m ${seconds}s` : `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      const remMinutes = minutes % 60;
      return remMinutes ? `${hours}h ${remMinutes}m` : `${hours}h`;
    }

    function overallScore(scores) {
      const values = Object.values(scores || {})
        .map((item) => Number(item?.score))
        .filter((value) => Number.isFinite(value));
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function barColor(value) {
      if (value >= 8) return '#a8e6cf';
      if (value >= 6) return '#ffd3b6';
      if (value >= 4) return '#ffaaa5';
      return '#ff8b94';
    }

    function setLoading(isLoading, mode) {
      if (isLoading) {
        const project = escapeHtml(input.value.trim() || 'project');
        statusBox.innerHTML = `
          <div class="loading-wrap">
            <div class="chalk-loading">Scanning <span class="loading-project">${project}</span><span class="loading-dots"></span></div>
            <div class="loading-bar" aria-hidden="true"></div>
            <div class="footnote">${mode === 'quick' ? 'Quick / free path — algorithmic only' : 'Deep path — collectors + Grok + tools'}</div>
          </div>
        `;
      } else {
        statusBox.innerHTML = '';
      }
    }

    function renderRadar(scores) {
      const size = 320;
      const center = size / 2;
      const radius = 106;
      const levels = 5;
      const keys = SCORE_META.map(([key]) => key);
      const labels = SCORE_META.map(([, label]) => label);
      const values = keys.map((key) => Number(scores?.[key]?.score || 0));
      const points = values.map((value, index) => {
        const angle = (-Math.PI / 2) + (index * Math.PI * 2 / values.length);
        const scale = Math.max(0, Math.min(10, value)) / 10;
        return [center + Math.cos(angle) * radius * scale, center + Math.sin(angle) * radius * scale];
      });
      const polygon = points.map(([x, y]) => `${x},${y}`).join(' ');
      const grid = Array.from({ length: levels }, (_, i) => {
        const levelRadius = radius * ((i + 1) / levels);
        const levelPoints = labels.map((_, index) => {
          const angle = (-Math.PI / 2) + (index * Math.PI * 2 / labels.length);
          return `${center + Math.cos(angle) * levelRadius},${center + Math.sin(angle) * levelRadius}`;
        }).join(' ');
        return `<polygon points="${levelPoints}" fill="none" stroke="rgba(232,232,232,0.14)" stroke-dasharray="4 6" />`;
      }).join('');
      const axes = labels.map((label, index) => {
        const angle = (-Math.PI / 2) + (index * Math.PI * 2 / labels.length);
        const x = center + Math.cos(angle) * radius;
        const y = center + Math.sin(angle) * radius;
        const tx = center + Math.cos(angle) * (radius + 34);
        const ty = center + Math.sin(angle) * (radius + 34);
        const anchor = Math.cos(angle) > 0.25 ? 'start' : Math.cos(angle) < -0.25 ? 'end' : 'middle';
        return `
          <line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="rgba(232,232,232,0.16)" />
          <text x="${tx}" y="${ty}" fill="#e8e8e8" font-size="13" text-anchor="${anchor}" dominant-baseline="middle">${label}</text>
        `;
      }).join('');
      return `
        <svg viewBox="0 0 ${size} ${size}" role="img" aria-label="Radar chart">
          ${grid}
          ${axes}
          <polygon points="${polygon}" fill="rgba(168,230,207,0.22)" stroke="#a8e6cf" stroke-width="2" />
          ${points.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="4" fill="#ffd3b6" />`).join('')}
        </svg>
      `;
    }

    function renderScoreBars(scores) {
      return SCORE_META.map(([key, label]) => {
        const value = Number(scores?.[key]?.score || 0);
        return `
          <div class="score-row">
            <div>${label}</div>
            <div class="bar"><span style="width:${Math.max(0, Math.min(100, value * 10))}%; background:${barColor(value)}"></span></div>
            <div>${value.toFixed(1)}/10</div>
          </div>
        `;
      }).join('');
    }

    function metricRows(raw) {
      const marketPrice = raw?.market?.current_price ?? raw?.market?.price ?? raw?.market?.price_usd;
      const rows = [
        ['Price', 'price', marketPrice],
        ['Market cap', 'market_cap', raw?.market?.market_cap],
        ['24h volume', 'total_volume', raw?.market?.total_volume],
        ['FDV', 'fdv', raw?.market?.fdv],
        ['TVL', 'tvl', raw?.onchain?.tvl],
        ['7d TVL %', 'tvl_change_7d', raw?.onchain?.tvl_change_7d],
        ['30d TVL %', 'tvl_change_30d', raw?.onchain?.tvl_change_30d],
        ['Fees 7d', 'fees_7d', raw?.onchain?.fees_7d],
        ['Revenue 7d', 'revenue_7d', raw?.onchain?.revenue_7d],
        ['Mentions', 'mentions', raw?.social?.mentions],
        ['Commits 90d', 'commits_90d', raw?.github?.commits_90d],
        ['Contributors', 'contributors', raw?.github?.contributors],
        ['Pct circulating', 'pct_circulating', raw?.tokenomics?.pct_circulating],
        ['Inflation rate', 'inflation_rate', raw?.tokenomics?.inflation_rate],
      ];
      return rows.map(([label, key, value]) => `
        <tr>
          <th>${escapeHtml(label)}</th>
          <td>${escapeHtml(formatMetricValue(label, key, value))}</td>
        </tr>
      `).join('');
    }

    function renderList(items, fallback = 'n/a') {
      if (!Array.isArray(items) || !items.length) return `<li>${escapeHtml(fallback)}</li>`;
      return items.map((item) => `<li>${escapeHtml(item)}</li>`).join('');
    }

    function renderReport(payload) {
      const verdict = payload?.verdict || 'HOLD';
      const raw = payload?.raw_data || {};
      const analysis = payload?.llm_analysis || {};
      const scores = payload?.scores || {};
      const cache = payload?.cache || {};
      const avgScore = overallScore(scores);
      reportBox.classList.remove('hidden');
      reportBox.innerHTML = `
        <div class="grid">
          <section class="panel">
            <div class="header-row">
              <div>
                <div class="footnote">${escapeHtml(payload?.mode || 'full')} scan</div>
                <h1 class="project-name">${escapeHtml(payload?.project_name || 'Unknown')}</h1>
              </div>
              <div class="verdict-wrap">
                <div class="verdict ${verdictClass(verdict)}">${escapeHtml(verdict)}</div>
                <div class="overall-score ${verdictClass(verdict)}">${avgScore !== null ? `${avgScore.toFixed(1)}/10` : 'n/a'}</div>
              </div>
            </div>
            <p class="analysis">${escapeHtml(analysis.analysis_text || 'No analysis available.')}</p>
            <div class="mini-grid">
              <div class="card moat">
                <h3>🛡 Moat</h3>
                <div>${escapeHtml(analysis.moat || 'n/a')}</div>
              </div>
              <div class="card risks">
                <h3>⚠ Risks</h3>
                <ul>${renderList(analysis.risks)}</ul>
              </div>
              <div class="card catalysts">
                <h3>🚀 Catalysts</h3>
                <ul>${renderList(analysis.catalysts)}</ul>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="section-title">Score Radar</div>
            ${renderRadar(scores)}
            <div class="score-list">${renderScoreBars(scores)}</div>
          </section>
        </div>

        <div class="grid" style="margin-top:18px; grid-template-columns: 0.9fr 1.1fr;">
          <section class="panel">
            <div class="section-title">Market Board</div>
            <table class="table"><tbody>${metricRows(raw)}</tbody></table>
          </section>
          <section class="panel">
            <div class="section-title">News & X Sentiment</div>
            <div class="two-col">
              <div class="sentiment-box">
                <div class="footnote">X sentiment</div>
                <p class="analysis">${escapeHtml(analysis.x_sentiment_summary || 'n/a')}</p>
              </div>
              <div class="sentiment-box">
                <div class="footnote">Competitor comparison</div>
                <p class="analysis">${escapeHtml(analysis.competitor_comparison || 'n/a')}</p>
              </div>
            </div>
            <div class="sentiment-box" style="margin-top:14px;">
              <div class="footnote">Key findings</div>
              <ul>${renderList(analysis.key_findings)}</ul>
            </div>
          </section>
        </div>

        <section class="panel" style="margin-top:18px;">
          <div class="footer-row">
            <div class="footnote">Generated: ${escapeHtml(payload?.generated_at || 'n/a')}</div>
            <div class="footnote">Cache: ${cache.hit ? 'HIT' : 'MISS'} · age ${escapeHtml(formatDuration(cache.age_ms))} · ttl ${escapeHtml(formatDuration(cache.ttl_ms))}</div>
          </div>
          <div class="footnote" style="margin-top:8px;">Powered by Grok 4.20 + CoinGecko + DeFiLlama</div>
        </section>
      `;
    }

    function showError(message) {
      errorBox.classList.remove('hidden');
      errorBox.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
    }

    function clearError() {
      errorBox.classList.add('hidden');
      errorBox.innerHTML = '';
    }

    async function runScan(mode = 'full') {
      clearError();
      reportBox.classList.add('hidden');
      const project = input.value.trim();
      if (!project) {
        showError('Inserisci un progetto da analizzare.');
        return;
      }
      setLoading(true, mode);
      try {
        const endpoint = mode === 'quick' ? `/alpha/quick?project=${encodeURIComponent(project)}` : `/alpha?project=${encodeURIComponent(project)}`;
        const response = await fetch(endpoint);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload?.error || 'Request failed');
        renderReport(payload);
        history.replaceState({}, '', `${location.pathname}?project=${encodeURIComponent(project)}&mode=${mode}`);
      } catch (error) {
        showError(error.message || 'Scan failed');
      } finally {
        setLoading(false, mode);
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      runScan('full');
    });

    quickLink.addEventListener('click', (event) => {
      event.preventDefault();
      runScan('quick');
    });

    const params = new URLSearchParams(location.search);
    const initialProject = params.get('project');
    const initialMode = params.get('mode') === 'quick' ? 'quick' : 'full';
    if (initialProject) {
      input.value = initialProject;
      runScan(initialMode);
    }
  </script>
</body>
</html>
